name: Generate SBOM

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  syft-sbom:
    name: Syft SBOM
    runs-on: ubuntu-latest

    steps:
      # 1. Repo'yu checkout et
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Syft'i yükle
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh

      # 3. SBOM oluştur
      - name: Generate SBOM
        run: |
          syft . -o json > sbom.json

      # 4. SBOM'u artifact olarak yükle
      - name: Upload SBOM
        uses: actions/upload-artifact@v3
        with:
          name: sbom
          path: sbom.json
